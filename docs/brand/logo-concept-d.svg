<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Concept D: "Memory Thread"
    Two overlapping teardrop/leaf curves that weave to form a V shape,
    one in solid teal, one as an outline — suggesting two interleaved
    memory threads converging. Abstract, premium, distinctive.
  -->
  <defs>
    <linearGradient id="gD1" x1="30" y1="30" x2="100" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="gD2" x1="170" y1="30" x2="100" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left teardrop: curves from top-left down to vertex center -->
  <!-- Outer edge sweeps left, inner edge is straight-ish -->
  <path d="M 96,158
           C 40,130 14,90 30,38
           C 42,12 72,18 84,38
           C 94,54 97,110 96,158 Z"
        fill="url(#gD1)"
        opacity="0.92"/>

  <!-- Right teardrop: mirrors left, slightly offset for depth -->
  <path d="M 104,158
           C 160,130 186,90 170,38
           C 158,12 128,18 116,38
           C 106,54 103,110 104,158 Z"
        fill="url(#gD2)"
        opacity="0.80"/>

  <!-- Overlap blend strip at center bottom — the convergence point -->
  <ellipse cx="100" cy="152" rx="10" ry="16"
           fill="#14B8A6" opacity="0.3" filter="url(#glowD)"/>

  <!-- Vertex node -->
  <circle cx="100" cy="158" r="5" fill="#E0FDFC" opacity="0.95"/>
  <circle cx="100" cy="158" r="9" fill="#14B8A6" opacity="0.2"/>

  <!-- Small memory nodes on each arm — like stored moments -->
  <circle cx="50"  cy="90"  r="3" fill="#E0FDFC" opacity="0.55"/>
  <circle cx="66"  cy="55"  r="2.5" fill="#E0FDFC" opacity="0.40"/>
  <circle cx="150" cy="90"  r="3" fill="#E0FDFC" opacity="0.55"/>
  <circle cx="134" cy="55"  r="2.5" fill="#E0FDFC" opacity="0.40"/>
</svg>
