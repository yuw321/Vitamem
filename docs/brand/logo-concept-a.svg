<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Concept A: "Pulse V"
    The V letterform, right arm continuing as an EKG QRS complex.
    Combines vita (life/pulse) with the V monogram.
  -->
  <defs>
    <linearGradient id="gA" x1="20" y1="20" x2="180" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="glowA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- V left arm + right arm, then EKG QRS pulse extending right -->
  <!-- Left arm: (24,40) → vertex (78,154) -->
  <!-- Right arm: vertex (78,154) → (112,40) -->
  <!-- EKG: flat → Q dip → R spike → S dip → baseline → flat -->
  <path d="M 24,40 L 78,154 L 112,40 L 122,40 L 126,54 L 132,18 L 140,66 L 146,40 L 174,40"
        stroke="url(#gA)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Memory node glow at vertex -->
  <circle cx="78" cy="154" r="6" fill="#14B8A6" filter="url(#glowA)" opacity="0.8"/>
  <circle cx="78" cy="154" r="3.5" fill="#E0FDFC"/>
</svg>
