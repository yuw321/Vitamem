<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #64748b; }
      .hex { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; fill: #0f172a; font-weight: 500; }
      .category { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 16px; fill: #0f172a; font-weight: 600; }
    </style>
  </defs>

  <!-- Title -->
  <text class="category" x="40" y="35">Primary Palette v2</text>

  <!-- Electric Blue (Active) -->
  <rect x="40" y="55" width="140" height="100" rx="8" fill="#3B82F6" />
  <text class="hex" x="40" y="180">Electric Blue</text>
  <text class="label" x="40" y="198">#3B82F6</text>
  <text class="label" x="40" y="216">Active / Primary CTA</text>

  <!-- Violet (Cooling) -->
  <rect x="200" y="55" width="140" height="100" rx="8" fill="#8B5CF6" />
  <text class="hex" x="200" y="180">Violet</text>
  <text class="label" x="200" y="198">#8B5CF6</text>
  <text class="label" x="200" y="216">Cooling / Accent</text>

  <!-- Warm Amber (Memory) -->
  <rect x="360" y="55" width="140" height="100" rx="8" fill="#F59E0B" />
  <text class="hex" x="360" y="180">Warm Amber</text>
  <text class="label" x="360" y="198">#F59E0B</text>
  <text class="label" x="360" y="216">Memory / Dormant</text>

  <!-- Emerald (Success) -->
  <rect x="520" y="55" width="140" height="100" rx="8" fill="#10B981" />
  <text class="hex" x="520" y="180">Emerald</text>
  <text class="label" x="520" y="198">#10B981</text>
  <text class="label" x="520" y="216">Success / Stored</text>

  <!-- Deep Ink (Text) -->
  <rect x="680" y="55" width="140" height="100" rx="8" fill="#0F172A" />
  <text class="hex" x="680" y="180">Deep Ink</text>
  <text class="label" x="680" y="198">#0F172A</text>
  <text class="label" x="680" y="216">Text / Dark BG</text>

  <!-- Functional Colors -->
  <text class="category" x="40" y="270">Lifecycle States</text>

  <!-- Active -->
  <rect x="40" y="290" width="100" height="60" rx="6" fill="#3B82F6" />
  <text style="font-family: sans-serif; font-size: 14px; font-weight: 600; fill: white; text-anchor: middle;" x="90" y="325">Active</text>

  <!-- Cooling -->
  <rect x="160" y="290" width="100" height="60" rx="6" fill="#8B5CF6" />
  <text style="font-family: sans-serif; font-size: 14px; font-weight: 600; fill: white; text-anchor: middle;" x="210" y="325">Cooling</text>

  <!-- Dormant -->
  <rect x="280" y="290" width="100" height="60" rx="6" fill="#F59E0B" />
  <text style="font-family: sans-serif; font-size: 14px; font-weight: 600; fill: white; text-anchor: middle;" x="330" y="325">Dormant</text>

  <!-- Closed -->
  <rect x="400" y="290" width="100" height="60" rx="6" fill="#64748B" />
  <text style="font-family: sans-serif; font-size: 14px; font-weight: 600; fill: white; text-anchor: middle;" x="450" y="325">Closed</text>

  <!-- Stored -->
  <rect x="520" y="290" width="100" height="60" rx="6" fill="#10B981" />
  <text style="font-family: sans-serif; font-size: 14px; font-weight: 600; fill: white; text-anchor: middle;" x="570" y="325">Stored</text>

  <!-- Supporting -->
  <text class="category" x="40" y="400">Supporting</text>

  <rect x="40" y="415" width="80" height="40" rx="4" fill="#1E293B" />
  <text class="label" x="40" y="470">#1E293B</text>

  <rect x="140" y="415" width="80" height="40" rx="4" fill="#334155" />
  <text class="label" x="140" y="470">#334155</text>

  <rect x="240" y="415" width="80" height="40" rx="4" fill="#94A3B8" />
  <text class="label" x="240" y="470">#94A3B8</text>

  <rect x="340" y="415" width="80" height="40" rx="4" fill="#E2E8F0" />
  <text class="label" x="340" y="470">#E2E8F0</text>

  <rect x="440" y="415" width="80" height="40" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
  <text class="label" x="440" y="470">#F8FAFC</text>
</svg>
