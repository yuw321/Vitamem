<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <style>
      .thread-line { fill: none; stroke: #1a1f36; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dot-active { fill: #1a1f36; }
      .dot-cooling { fill: #5b6b8a; }
      .dot-dormant { fill: #8e9ab5; }
      .wordmark { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-weight: 600; font-size: 52px; fill: #1a1f36; letter-spacing: -0.5px; }
    </style>
  </defs>
  <!-- Compact logo mark -->
  <g transform="translate(20, 20)">
    <path class="thread-line" d="
      M 10 60
      C 30 60, 38 30, 52 30
      C 66 30, 66 60, 80 60
      C 94 60, 94 90, 108 90
      C 118 90, 118 60, 125 60
      C 130 60, 132 50, 130 45
      C 128 40, 122 40, 121 45
      C 120 50, 124 53, 126 52
    " />
    <circle class="dot-active" cx="52" cy="30" r="5" />
    <circle class="dot-cooling" cx="80" cy="60" r="4" />
    <circle class="dot-dormant" cx="108" cy="90" r="3" />
  </g>
  <!-- Wordmark -->
  <text class="wordmark" x="175" y="100">vitamem</text>
</svg>
