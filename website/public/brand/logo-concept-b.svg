<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Concept B: "Lifecycle Arc"
    Four nodes on a bezier arc representing the thread states:
    active → cooling → dormant → closed
    The arc is the core product metaphor — clean, abstract, on-brand.
  -->
  <defs>
    <linearGradient id="gB" x1="22" y1="100" x2="178" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arc: M 22,158 Q 100,30 178,158 -->
  <!-- Node positions (computed on the bezier at t=0, 0.33, 0.67, 1): -->
  <!--   t=0:    (22,  158) -->
  <!--   t=0.33: (74,  102) -->
  <!--   t=0.67: (126, 102) -->
  <!--   t=1:    (178, 158) -->

  <!-- Connecting arc line -->
  <path d="M 22,158 Q 100,30 178,158"
        stroke="url(#gB)"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.35"/>

  <!-- Node 1: active — large, bright teal -->
  <circle cx="22"  cy="158" r="14" fill="#0F766E" opacity="0.25"/>
  <circle cx="22"  cy="158" r="10" fill="#14B8A6" filter="url(#glowB)"/>
  <circle cx="22"  cy="158" r="5"  fill="#E0FDFC"/>

  <!-- Node 2: cooling — medium, warm -->
  <circle cx="74"  cy="102" r="8"  fill="#0D9488"/>
  <circle cx="74"  cy="102" r="3.5" fill="#99F6E4"/>

  <!-- Node 3: dormant — smaller, outline treatment -->
  <circle cx="126" cy="102" r="6"  stroke="#0D9488" stroke-width="2" fill="none"/>
  <circle cx="126" cy="102" r="2.5" fill="#0D9488" opacity="0.6"/>

  <!-- Node 4: closed — small, muted -->
  <circle cx="178" cy="158" r="4.5" fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- State labels (small, below each node) -->
  <text x="22"  y="180" text-anchor="middle" font-family="-apple-system, sans-serif"
        font-size="9" font-weight="600" letter-spacing="0.3" fill="#14B8A6" opacity="0.8">active</text>
  <text x="74"  y="122" text-anchor="middle" font-family="-apple-system, sans-serif"
        font-size="9" font-weight="600" letter-spacing="0.3" fill="#94A3B8" opacity="0.8">cooling</text>
  <text x="126" y="122" text-anchor="middle" font-family="-apple-system, sans-serif"
        font-size="9" font-weight="600" letter-spacing="0.3" fill="#94A3B8" opacity="0.8">dormant</text>
  <text x="178" y="178" text-anchor="middle" font-family="-apple-system, sans-serif"
        font-size="9" font-weight="600" letter-spacing="0.3" fill="#64748B" opacity="0.8">closed</text>
</svg>
