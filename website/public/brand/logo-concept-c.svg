<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Concept C: "Bold V Monogram"
    A thick, filled V with a teal-to-deep gradient and a glowing memory
    dot at the vertex. Versatile — works as app icon, favicon, avatar.
  -->
  <defs>
    <linearGradient id="gC-fill" x1="20" y1="22" x2="180" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#134E4A"/>
      <stop offset="55%"  stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="gC-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="glowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square for icon context -->
  <rect x="4" y="4" width="192" height="192" rx="44" fill="url(#gC-bg)"/>

  <!-- Filled V shape (hollow V polygon) -->
  <!-- Outer V: left tip (32,32), vertex (100,162), right tip (168,32) -->
  <!-- Inner V cutout creates the V letterform with even arm width ~22px -->
  <path d="M 32,32 L 100,168 L 168,32 L 146,32 L 100,134 L 54,32 Z"
        fill="url(#gC-fill)"/>

  <!-- Glow bloom behind vertex dot -->
  <circle cx="100" cy="168" r="18" fill="#14B8A6" opacity="0.15" filter="url(#glowC)"/>

  <!-- Vertex memory dot -->
  <circle cx="100" cy="168" r="7"  fill="#14B8A6" opacity="0.9"/>
  <circle cx="100" cy="168" r="3"  fill="#E0FDFC"/>

  <!-- Subtle highlight dots at arm tips -->
  <circle cx="32"  cy="32"  r="3.5" fill="#14B8A6" opacity="0.5"/>
  <circle cx="168" cy="32"  r="3.5" fill="#14B8A6" opacity="0.5"/>
</svg>
