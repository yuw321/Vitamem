name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a feature idea? Check the [Roadmap](../../ROADMAP.md) first to see if it's already planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Embedding/extraction pipeline
        - Storage adapters
        - LLM adapters
        - Retrieval/reranking
        - Thread lifecycle
        - Developer experience
        - Documentation
        - Other
    validations:
      required: false
